name: se_peav_mobile
description: "SE-PEAV - Sistema Edge de Predimensionamiento Estructural"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  
  # State Management
  flutter_riverpod: ^2.6.1
  
  # Navigation
  go_router: ^14.6.2
  
  # HTTP Client
  dio: ^5.7.0
  
  # Storage
  flutter_secure_storage: ^9.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Camera & Video
  camera: ^0.11.0+2
  video_player: ^2.9.2
  
  # File Picker & Upload
  file_picker: ^8.1.7
  image_picker: ^1.1.2
  
  # Permissions
  permission_handler: ^11.3.1
  
  # Utils
  intl: ^0.19.0
  path_provider: ^2.1.5
  
  # Geolocalización
  geolocator: ^13.0.2
  
  # QR/Barcode (para marcadores de referencia)
  mobile_scanner: ^5.2.3
  
  # URL Launcher
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
