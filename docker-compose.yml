version: "3.9"

# ─── Volúmenes compartidos ────────────────────────────────────────────────────
volumes:
  workspace_raw:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./workspace/raw_data
  workspace_processed:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./workspace/processed_data
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

# ─── Red interna ──────────────────────────────────────────────────────────────
networks:
  se_peav_net:
    driver: bridge

# ─── Servicios ────────────────────────────────────────────────────────────────
services:

  # ── Infraestructura ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: se_peav_postgres
    environment:
      POSTGRES_USER: se_peav
      POSTGRES_PASSWORD: se_peav_password
      POSTGRES_DB: se_peav
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - se_peav_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U se_peav"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: se_peav_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - se_peav_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: se_peav_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - se_peav_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: se_peav/backend:latest
    container_name: se_peav_backend
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - S3_ENDPOINT=minio:9000
      - DEBUG=true
      - SECRET_KEY=your-secret-key-change-in-production-use-openssl-rand-hex-32
    volumes:
      - ./backend:/app
    networks:
      - se_peav_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker ───────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: se_peav/backend:latest
    container_name: se_peav_celery_worker
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - S3_ENDPOINT=minio:9000
    volumes:
      - ./backend:/app
    networks:
      - se_peav_net
    depends_on:
      - backend
      - redis
    command: celery -A app.services.processing worker --loglevel=info --concurrency=2

  # ── 01 Ingest Layer (Pipeline original) ─────────────────────────────────────
  ingest:
    build:
      context: ./01_ingest_layer
      dockerfile: Dockerfile
    image: se_peav/ingest:latest
    container_name: se_peav_ingest
    volumes:
      - workspace_raw:/data/raw_data
      - workspace_processed:/data/processed_data
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - se_peav_net
    entrypoint: ["python", "extract_frames.py"]
    profiles:
      - pipeline

  # ── 02 Geometry Engine ──────────────────────────────────────────────────────
  geometry_engine:
    build:
      context: ./02_geometry_engine
      dockerfile: Dockerfile
    image: se_peav/geometry_engine:latest
    container_name: se_peav_geometry
    volumes:
      - workspace_processed:/data/processed_data
    environment:
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - se_peav_net
    entrypoint: ["python", "colmap_runner.py"]
    profiles:
      - pipeline

  # ── 03 AI Analysis ──────────────────────────────────────────────────────────
  ai_analysis:
    build:
      context: ./03_ai_analysis
      dockerfile: Dockerfile
    image: se_peav/ai_analysis:latest
    container_name: se_peav_ai
    volumes:
      - workspace_processed:/data/processed_data
    environment:
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - se_peav_net
    entrypoint: ["python", "detect_elements.py"]
    profiles:
      - pipeline

  # ── 04 Reporting ETL ────────────────────────────────────────────────────────
  reporting_etl:
    build:
      context: ./04_reporting_etl
      dockerfile: Dockerfile
    image: se_peav/reporting:latest
    container_name: se_peav_reporting
    volumes:
      - workspace_processed:/data/processed_data
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - se_peav_net
    entrypoint: ["python", "generate_report.py"]
    profiles:
      - pipeline
